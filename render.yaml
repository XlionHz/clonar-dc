services:
  - type: web
    name: clonar-dc-api
    runtime: docker
    plan: free
    region: virginia
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /status
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clonar-dc-db
          property: connectionString
      - key: CLONARDC_ENV
        value: staging
      - key: CLONARDC_ADMIN_EMAIL
        sync: false
      - key: CLONARDC_ADMIN_PASSWORD
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_USE_SANDBOX
        value: "true"
      - key: CLONARDC_PRICE_1M
        value: "0"
      - key: CLONARDC_PRICE_3M
        value: "0"
      - key: CLONARDC_PRICE_6M
        value: "0"
      - key: CLONARDC_PRICE_12M
        value: "0"
      - key: CLONARDC_PRICE_PERMANENT
        value: "0"

databases:
  - name: clonar-dc-db
    plan: free
    region: virginia
    databaseName: clonardc
    user: clonardc
    postgresMajorVersion: "18"
    ipAllowList: []
