name: Clonar DC Verified Windows Build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'build-status/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: clonar-dc-build
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      APP_VERSION: '0.5.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and build desktop
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path build-status | Out-Null
          dotnet restore .\src\ClonarDC.Desktop\ClonarDC.Desktop.csproj
          $output = & dotnet build .\src\ClonarDC.Desktop\ClonarDC.Desktop.csproj -c Release --no-restore 2>&1
          $output | Tee-Object -FilePath build-status\desktop-build.log | Write-Host
          if ($LASTEXITCODE -ne 0) {
            $output | Select-Object -Last 220 | Set-Content build-status\compile-error.txt
            throw 'Desktop build failed.'
          }

      - name: Verify Discord connection contract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $probe = Get-Content .\src\ClonarDC.Desktop\Services\DiscordConnectionProbe.cs -Raw
          $handler = Get-Content .\src\ClonarDC.Desktop\MainWindow.TokenValidation.cs -Raw
          $xaml = Get-Content .\src\ClonarDC.Desktop\MainWindow.xaml -Raw
          foreach ($required in @('users/@me','gateway/bot','ClientWebSocket','["intents"] = 1','GUILD_CREATE','DiscordBot (https://github.com/XlionHz/clonar-dc, 0.5.3)')) {
            if (-not $probe.Contains($required)) { throw "Discord probe is missing: $required" }
          }
          if (-not $handler.Contains('ValidateAndDiscoverAsync')) { throw 'Reliable token handler is not connected to the probe.' }
          if (-not $xaml.Contains('Click="TestTokenReliable_Click"')) { throw 'The Test Token button still uses the legacy handler.' }
          'Token validation uses explicit bot REST authentication and Gateway guild discovery. A real Discord token is not available in CI, so live Discord authentication remains a manual test.' | Set-Content out/discord-contract.txt

      - name: Verify dark control templates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $theme = Get-Content .\src\ClonarDC.Desktop\App.xaml -Raw
          foreach ($required in @('ControlTemplate TargetType="{x:Type Button}"','ControlTemplate TargetType="{x:Type ComboBox}"','Style TargetType="{x:Type ComboBoxItem}"','#0D0F18','#11131D')) {
            if (-not $theme.Contains($required)) { throw "Dark theme is missing: $required" }
          }
          if ($theme.Contains('Color.FromRgb(248, 250, 252)')) { throw 'A light selector workaround is still present.' }
          'Buttons, disabled buttons, combo boxes, dropdowns, and combo items use explicit dark templates.' | Set-Content out/theme-contract.txt

      - name: Publish desktop self-contained
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path out/app | Out-Null
          $fullVersion = "$env:APP_VERSION.$env:GITHUB_RUN_NUMBER"
          dotnet publish .\src\ClonarDC.Desktop\ClonarDC.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false -p:Version=$env:APP_VERSION -p:FileVersion=$fullVersion -p:AssemblyVersion=$fullVersion -o out/app
          if (-not (Test-Path out/app/ClonarDC.exe)) { throw 'ClonarDC.exe was not generated.' }

      - name: Restore, build and publish backend
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet restore .\src\ClonarDC.Server\ClonarDC.Server.csproj
          $output = & dotnet build .\src\ClonarDC.Server\ClonarDC.Server.csproj -c Release --no-restore 2>&1
          $output | Tee-Object -FilePath build-status\backend-build.log | Write-Host
          if ($LASTEXITCODE -ne 0) {
            $output | Select-Object -Last 180 | Set-Content build-status\backend-error.txt
            throw 'Backend build failed.'
          }
          New-Item -ItemType Directory -Force -Path out/backend | Out-Null
          dotnet publish .\src\ClonarDC.Server\ClonarDC.Server.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false -o out/backend
          if (-not (Test-Path out/backend/ClonarDC.Server.exe)) { throw 'Local backend was not generated.' }

      - name: Account registration integration smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $testData = Join-Path $env:RUNNER_TEMP 'clonardc-auth-smoke'
          Remove-Item $testData -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $testData | Out-Null
          $env:CLONARDC_LISTEN = 'http://127.0.0.1:18787'
          $env:CLONARDC_DATA = $testData
          $env:CLONARDC_ADMIN_EMAIL = 'build-admin@example.invalid'
          $env:CLONARDC_ADMIN_PASSWORD = 'BuildOnly!Admin_2026'
          $backend = Start-Process -FilePath "$PWD\out\backend\ClonarDC.Server.exe" -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            for ($i = 0; $i -lt 40; $i++) {
              try { Invoke-RestMethod -Uri 'http://127.0.0.1:18787/status' -TimeoutSec 1 | Out-Null; $ready = $true; break }
              catch { Start-Sleep -Milliseconds 250 }
            }
            if (-not $ready) { throw 'Account backend did not start.' }
            $suffix = [Guid]::NewGuid().ToString('N')
            $email = "user-$suffix@example.invalid"
            $password = 'BuildOnly!User_2026'
            $body = @{ name='Build User'; email=$email; password=$password } | ConvertTo-Json
            $register = Invoke-RestMethod -Method Post -Uri 'http://127.0.0.1:18787/auth/register' -ContentType 'application/json' -Body $body
            if ($register.status -ne 'pending') { throw 'Registration did not return pending.' }
            $duplicateRejected = $false
            try { Invoke-RestMethod -Method Post -Uri 'http://127.0.0.1:18787/auth/register' -ContentType 'application/json' -Body $body | Out-Null }
            catch { if ($_.Exception.Response.StatusCode.value__ -eq 409) { $duplicateRejected = $true } }
            if (-not $duplicateRejected) { throw 'Duplicate registration was not rejected with HTTP 409.' }
            $login = Invoke-RestMethod -Method Post -Uri 'http://127.0.0.1:18787/auth/login' -ContentType 'application/json' -Body (@{ email='build-admin@example.invalid'; password='BuildOnly!Admin_2026' } | ConvertTo-Json)
            if ($login.user.role -ne 'admin') { throw 'Admin login did not return admin.' }
            'Registration succeeded, returned pending, and duplicate email was rejected.' | Set-Content out/auth-smoke.txt
          }
          finally {
            if ($backend -and -not $backend.HasExited) { Stop-Process -Id $backend.Id -Force }
            Remove-Item Env:CLONARDC_LISTEN,Env:CLONARDC_DATA,Env:CLONARDC_ADMIN_EMAIL,Env:CLONARDC_ADMIN_PASSWORD -ErrorAction SilentlyContinue
          }

      - name: Verify registration UX contract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $xaml = Get-Content .\src\ClonarDC.Desktop\RegisterWindow.xaml -Raw
          $code = Get-Content .\src\ClonarDC.Desktop\RegisterWindow.xaml.cs -Raw
          foreach ($required in @('SuccessPanel','SuccessTitleText','SuccessBodyText','BusyBar','FeedbackBox')) {
            if (-not $xaml.Contains($required)) { throw "Registration XAML is missing $required." }
          }
          foreach ($required in @('DialogResult = true','Creating account','FriendlyRegistrationError','TimeSpan.FromSeconds(25)')) {
            if (-not $code.Contains($required)) { throw "Registration flow is missing contract: $required." }
          }
          'Registration UI contract verified.' | Set-Content out/registration-ui-smoke.txt

      - name: Desktop runtime smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $proc = Start-Process -FilePath "$PWD\out\app\ClonarDC.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($proc.HasExited) { throw "ClonarDC.exe exited early with code $($proc.ExitCode)." }
          Stop-Process -Id $proc.Id -Force
          'Desktop process stayed alive for 8 seconds.' | Set-Content out/smoke-runtime.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer, hashes and admin update package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw 'ISCC.exe was not found.' }
          & $iscc 'installer\ClonarDC.iss'
          $setup = 'out\installer\Clonar-DC-Setup.exe'
          if (-not (Test-Path $setup)) { throw 'Setup.exe was not generated.' }
          $hash = (Get-FileHash $setup -Algorithm SHA256).Hash
          $hash | Set-Content 'out\installer\Clonar-DC-Setup.sha256'
          "VERSION=$env:APP_VERSION`nSHA256=$hash" | Set-Content 'out\installer\build-info.txt'

          $packageRoot = 'out\update-package'
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item $setup (Join-Path $packageRoot 'Clonar-DC-Setup.exe')
          [ordered]@{
            formatVersion = 1
            version = $env:APP_VERSION
            tag = "v$env:APP_VERSION"
            title = "Clonar DC $env:APP_VERSION"
            notes = 'Dark controls, reliable official Discord bot token validation through REST and Gateway, and secure administrator update publishing.'
            setupFile = 'Clonar-DC-Setup.exe'
            sha256 = $hash
          } | ConvertTo-Json -Depth 4 | Set-Content (Join-Path $packageRoot 'manifest.json') -Encoding UTF8

          $temporaryZip = "out\Clonar-DC-$env:APP_VERSION-update.zip"
          $packagePath = "out\Clonar-DC-$env:APP_VERSION.clonardc-update"
          Compress-Archive -Path "$packageRoot\*" -DestinationPath $temporaryZip -CompressionLevel Optimal -Force
          Move-Item $temporaryZip $packagePath -Force
          if (-not (Test-Path $packagePath)) { throw 'Admin update package was not generated.' }

          $verifyRoot = 'out\verify-update-package'
          Copy-Item $packagePath 'out\verify-update-package.zip' -Force
          Expand-Archive 'out\verify-update-package.zip' $verifyRoot -Force
          $manifest = Get-Content (Join-Path $verifyRoot 'manifest.json') -Raw | ConvertFrom-Json
          $actual = (Get-FileHash (Join-Path $verifyRoot 'Clonar-DC-Setup.exe') -Algorithm SHA256).Hash
          if ($manifest.version -ne $env:APP_VERSION) { throw 'Update package manifest version is incorrect.' }
          if ($actual -ne $manifest.sha256) { throw 'Update package SHA-256 verification failed.' }
          'Admin update package contains a verified installer and manifest.' | Set-Content out/update-package-smoke.txt

      - name: Install and launch smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $setup = "$PWD\out\installer\Clonar-DC-Setup.exe"
          $install = Start-Process -FilePath $setup -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-','/LANG=en' -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Installer returned code $($install.ExitCode)." }
          $root = Join-Path $env:LOCALAPPDATA 'Programs\Clonar DC'
          $exe = Join-Path $root 'ClonarDC.exe'
          $backend = Join-Path $root 'backend\ClonarDC.Server.exe'
          if (-not (Test-Path $exe)) { throw 'Installed executable was not found.' }
          if (-not (Test-Path $backend)) { throw 'Installed backend was not found.' }
          $selectedLanguage = Get-ItemPropertyValue -Path 'HKCU:\Software\Clonar DC' -Name Language
          if ($selectedLanguage -ne 'en-US') { throw "Installer language was not persisted: $selectedLanguage" }
          $proc = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 8
          if ($proc.HasExited) { throw "Installed app exited early with code $($proc.ExitCode)." }
          Stop-Process -Id $proc.Id -Force
          'Installer succeeded, persisted en-US, and installed app stayed alive.' | Set-Content out/installer/smoke-install.txt

      - name: Upload verified build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Clonar-DC-Verified-Windows
          path: |
            out/installer/Clonar-DC-Setup.exe
            out/installer/Clonar-DC-Setup.sha256
            out/installer/build-info.txt
            out/installer/smoke-install.txt
            out/Clonar-DC-${{ env.APP_VERSION }}.clonardc-update
            out/update-package-smoke.txt
            out/smoke-runtime.txt
            out/auth-smoke.txt
            out/registration-ui-smoke.txt
            out/discord-contract.txt
            out/theme-contract.txt
          if-no-files-found: error

      - name: Record successful build status
        if: success()
        shell: pwsh
        run: |
          $hash = (Get-Content 'out\installer\Clonar-DC-Setup.sha256' -Raw).Trim()
          @"
          # Latest verified build

          Status: **SUCCESS**
          Version: `$env:APP_VERSION`
          Source commit: `${{ github.sha }}`
          Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA-256: `$hash`

          Validation: desktop and backend compiled; account registration tested; dark control contracts checked; Discord REST/Gateway integration contract checked; installer and admin update package generated and verified; installed app launched.
          "@ | Set-Content build-status/latest.md -Encoding UTF8
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add build-status
          git commit -m 'ci: record verified Windows build [skip ci]'
          git push

      - name: Record failure status
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-status | Out-Null
          @"
          # Latest verified build

          Status: **FAILURE**
          Version: `$env:APP_VERSION`
          Source commit: `${{ github.sha }}`
          Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@ | Set-Content build-status/latest.md -Encoding UTF8
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add build-status
          git commit -m 'ci: record failed Windows build diagnostics [skip ci]' || exit 0
          git push || exit 0