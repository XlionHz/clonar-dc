name: Clonar DC Verified Windows Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'build-status/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore desktop
        shell: pwsh
        run: dotnet restore .\src\ClonarDC.Desktop\ClonarDC.Desktop.csproj

      - name: Build desktop
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-status | Out-Null
          $output = & dotnet build .\src\ClonarDC.Desktop\ClonarDC.Desktop.csproj -c Release --no-restore 2>&1
          $output | Tee-Object -FilePath build-status\desktop-build.log | Write-Host
          if ($LASTEXITCODE -ne 0) {
            $output | Select-Object -Last 160 | Set-Content build-status\compile-error.txt
            throw 'Desktop build failed.'
          }

      - name: Publish desktop self-contained
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path out/app | Out-Null
          dotnet publish .\src\ClonarDC.Desktop\ClonarDC.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false -p:Version=3.0.0 -o out/app
          if (-not (Test-Path out/app/ClonarDC.exe)) { throw 'ClonarDC.exe não foi gerado.' }

      - name: Restore and build backend
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path .\src\ClonarDC.Server\ClonarDC.Server.csproj) {
            dotnet restore .\src\ClonarDC.Server\ClonarDC.Server.csproj
            $backendOutput = & dotnet build .\src\ClonarDC.Server\ClonarDC.Server.csproj -c Release --no-restore 2>&1
            $backendOutput | Tee-Object -FilePath build-status\backend-build.log | Write-Host
            if ($LASTEXITCODE -ne 0) {
              $backendOutput | Select-Object -Last 160 | Set-Content build-status\backend-error.txt
              throw 'Backend build failed.'
            }
            New-Item -ItemType Directory -Force -Path out/backend | Out-Null
            dotnet publish .\src\ClonarDC.Server\ClonarDC.Server.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false -o out/backend
          }

      - name: Desktop runtime smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $proc = Start-Process -FilePath "$PWD\out\app\ClonarDC.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($proc.HasExited) { throw "ClonarDC.exe encerrou prematuramente com código $($proc.ExitCode)." }
          Stop-Process -Id $proc.Id -Force
          "Desktop process stayed alive for 8 seconds on windows-latest." | Set-Content out/smoke-runtime.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw 'ISCC.exe não encontrado.' }
          & $iscc "installer\ClonarDC.iss"
          if (-not (Test-Path "out\installer\Clonar-DC-Setup.exe")) { throw 'Setup.exe não foi gerado.' }
          $hash = (Get-FileHash "out\installer\Clonar-DC-Setup.exe" -Algorithm SHA256).Hash
          $hash | Set-Content "out\installer\Clonar-DC-Setup.sha256"
          "SHA256=$hash" | Set-Content "out\installer\build-info.txt"

      - name: Install and launch smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $setup = "$PWD\out\installer\Clonar-DC-Setup.exe"
          $install = Start-Process -FilePath $setup -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-' -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Instalador retornou código $($install.ExitCode)." }
          $exe = Join-Path $env:LOCALAPPDATA 'Programs\Clonar DC\ClonarDC.exe'
          if (-not (Test-Path $exe)) { throw "Executável instalado não encontrado: $exe" }
          $proc = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 8
          if ($proc.HasExited) { throw "Aplicativo instalado encerrou prematuramente com código $($proc.ExitCode)." }
          Stop-Process -Id $proc.Id -Force
          "Installer succeeded and installed app stayed alive for 8 seconds." | Set-Content out/installer/smoke-install.txt

      - name: Upload verified build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Clonar-DC-Verified-Windows
          path: |
            out/installer/Clonar-DC-Setup.exe
            out/installer/Clonar-DC-Setup.sha256
            out/installer/build-info.txt
            out/installer/smoke-install.txt
            out/smoke-runtime.txt
          if-no-files-found: error

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "v3.0.0-rc.$env:GITHUB_RUN_NUMBER"
          $title = "Clonar DC 3.0.0 RC $env:GITHUB_RUN_NUMBER"
          $notes = "Build Windows verificada automaticamente: compile, publish self-contained, smoke test do executável, instalação silenciosa e smoke test do aplicativo instalado. Faça o primeiro teste de clonagem apenas em servidores descartáveis."
          gh release create $tag "out/installer/Clonar-DC-Setup.exe" "out/installer/Clonar-DC-Setup.sha256" "out/installer/smoke-install.txt" "out/smoke-runtime.txt" --title $title --notes $notes --target $env:GITHUB_SHA

      - name: Record successful build status
        if: success()
        shell: pwsh
        run: |
          $hash = (Get-Content "out\installer\Clonar-DC-Setup.sha256" -Raw).Trim()
          @"
          # Última build verificada

          Status: **SUCESSO**
          Versão: `3.0.0-rc.${{ github.run_number }}`
          Commit de origem: `${{ github.sha }}`
          Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Release: https://github.com/${{ github.repository }}/releases/tag/v3.0.0-rc.${{ github.run_number }}
          SHA-256: `$hash`
          "@ | Set-Content build-status/latest.md -Encoding UTF8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-status
          git commit -m "ci: record verified Windows build [skip ci]"
          git push

      - name: Record failure status
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build-status | Out-Null
          @"
          # Última build verificada

          Status: **FALHA**
          Commit de origem: `${{ github.sha }}`
          Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Consulte os arquivos de diagnóstico nesta pasta.
          "@ | Set-Content build-status/latest.md -Encoding UTF8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-status
          git commit -m "ci: record failed Windows build diagnostics [skip ci]" || exit 0
          git push || exit 0
