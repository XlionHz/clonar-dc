name: Native Windows Build

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/native-windows.yml'
      - 'installer/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore desktop
        run: dotnet restore src/ClonarDC.Desktop/ClonarDC.Desktop.csproj

      - name: Build desktop
        run: dotnet build src/ClonarDC.Desktop/ClonarDC.Desktop.csproj -c Release --no-restore

      - name: Build server
        run: dotnet build src/ClonarDC.Server/ClonarDC.Server.csproj -c Release

      - name: Publish Windows x64 self-contained
        run: dotnet publish src/ClonarDC.Desktop/ClonarDC.Desktop.csproj -c Release -r win-x64 --self-contained true -o out/app

      - name: Create portable ZIP
        shell: pwsh
        run: Compress-Archive -Path out/app/* -DestinationPath out/Clonar-DC-Portable-win-x64.zip -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' installer/ClonarDC.iss
          if (!(Test-Path 'out/installer/Clonar-DC-Setup.exe')) { throw 'Installer nao foi gerado.' }
          (Get-FileHash 'out/installer/Clonar-DC-Setup.exe' -Algorithm SHA256).Hash | Set-Content 'out/installer/SHA256.txt'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clonar-DC-Windows
          path: |
            out/installer/Clonar-DC-Setup.exe
            out/installer/SHA256.txt
            out/Clonar-DC-Portable-win-x64.zip
          if-no-files-found: error

      - name: Publish rolling prerelease
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete alpha-latest --yes --cleanup-tag 2>$null; if ($LASTEXITCODE -ne 0) { $global:LASTEXITCODE = 0 }
          gh release create alpha-latest --prerelease --title 'Clonar DC — Alpha mais recente' --notes 'Build automatizado de desenvolvimento. Ainda requer validacao funcional no Windows e com servidores de teste.' out/installer/Clonar-DC-Setup.exe out/installer/SHA256.txt out/Clonar-DC-Portable-win-x64.zip
