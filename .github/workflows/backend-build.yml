name: Backend Build

on:
  push:
    branches: [ main ]
    paths:
      - 'src/ClonarDC.Server/**'
      - '.github/workflows/backend-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build src/ClonarDC.Server/ClonarDC.Server.csproj -c Release
      - run: dotnet publish src/ClonarDC.Server/ClonarDC.Server.csproj -c Release -r linux-x64 --self-contained true -o out/server-linux-x64
      - run: tar -czf out/Clonar-DC-Server-linux-x64.tar.gz -C out/server-linux-x64 .
      - uses: actions/upload-artifact@v4
        with:
          name: Clonar-DC-Backend-linux-x64
          path: out/Clonar-DC-Server-linux-x64.tar.gz
